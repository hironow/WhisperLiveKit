gitignore: true
# Fork of QuentinFuxa/WhisperLiveKit: every Markdown file here is upstream's,
# so all are ignored (their style is upstream's concern). Future hironow-own
# docs would be linted unless added below.
ignores:
  - node_modules/**
  - .venv/**
  - "**/vendor/**"
  - whisperlivekit/**
  - chrome-extension/**
  - docs/**
  - README.md
  - CONTRIBUTING.md
  - USAGE.md
  - DEV_NOTES.md
  - LOCAL_INSTALL_GUIDE.md
  - CHANGELOG.md
