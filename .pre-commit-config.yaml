# prek (j178/prek) — pre-commit reimplementation. Patterned on hironow/dotfiles
# but self-contained (no `just` dependency).
#   Install: prek install -t pre-commit -t pre-push
#   Run:     prek run --all-files
minimum_prek_version: "0.4.0"

# This is a fork of QuentinFuxa/WhisperLiveKit; all source + docs below are
# upstream's. Exclude them so the hooks never reformat or block on upstream
# content (which would diverge the fork and break upstream-merge). Only repo
# config and any future hironow-own files stay in scope.
exclude: |
  (?x)^(
    whisperlivekit/|
    chrome-extension/|
    docs/
  )


repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-format
